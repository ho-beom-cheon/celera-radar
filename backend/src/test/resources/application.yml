spring:
  datasource:
    url: jdbc:h2:mem:seller_radar_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  flyway:
    enabled: false
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

seller-radar:
  features:
    smartstore-mock-enabled: true
  external:
    naver:
      mode: LEGACY
  web-security:
    csp-enforce: false
    csp-policy: "default-src 'none'; base-uri 'none'; frame-ancestors 'none'; form-action 'none'; object-src 'none'"
    csp-report-uri:
    allowed-origins:
      - http://localhost:5173
      - http://127.0.0.1:5173
  jwt:
    secret: test-only-jwt-secret-for-seller-radar-auth-tests-32-bytes
    access-token-ttl: PT30M
    refresh-token-ttl: P14D
  naver:
    client-id:
    client-secret:
    datalab-daily-quota: 1000
  naver-api-hub:
    client-id:
    client-secret:
    shopping-search-endpoint:
    shopping-insight-endpoint:
  auth:
    rate-limit:
      login-account-limit: 1000
      login-ip-limit: 1000
      login-window: PT15M
      signup-account-limit: 1000
      signup-ip-limit: 1000
      signup-window: PT1H
      password-reset-account-limit: 1000
      password-reset-ip-limit: 1000
      password-reset-window: PT1H
      max-tracked-keys: 100000
  wholesale:
    upload-security:
      quarantine-directory: ./build/test-quarantine
      max-file-size: 10MB
    xlsx-security:
      max-zip-entries: 1000
      max-uncompressed-size: 50MB
      min-inflate-ratio: 0.01
      max-sheets: 10
      max-rows: 20000
      max-columns: 100
      max-cell-length: 10000
      max-extracted-text-size: 20MB
    raw-lifecycle:
      retention: P7D
      cleanup-batch-size: 100
