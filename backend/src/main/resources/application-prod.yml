spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  flyway:
    enabled: true
    baseline-on-migrate: false
    baseline-version: 0
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: false

server:
  error:
    include-message: never
    include-binding-errors: never
    include-stacktrace: never

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

seller-radar:
  features:
    smartstore-mock-enabled: ${SMARTSTORE_MOCK_ENABLED:false}
  external:
    naver:
      mode: ${NAVER_PROVIDER_MODE:DISABLED}
  web-security:
    csp-enforce: ${CSP_ENFORCE:true}
    allowed-origins: ${CORS_ALLOWED_ORIGINS:}
  jwt:
    secret: ${JWT_SECRET}
