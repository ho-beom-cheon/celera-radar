spring:
  application:
    name: seller-radar
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/seller_radar}
    username: ${DB_USERNAME:seller}
    password: ${DB_PASSWORD:seller}
  flyway:
    enabled: ${FLYWAY_ENABLED:true}
    baseline-on-migrate: ${FLYWAY_BASELINE_ON_MIGRATE:false}
    baseline-version: 0
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:validate}
    open-in-view: false
  servlet:
    multipart:
      max-file-size: ${UPLOAD_MAX_FILE_SIZE:10MB}
      max-request-size: ${UPLOAD_MAX_REQUEST_SIZE:10MB}

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info

seller-radar:
  features:
    smartstore-mock-enabled: ${SMARTSTORE_MOCK_ENABLED:true}
  external:
    naver:
      mode: ${NAVER_PROVIDER_MODE:LEGACY}
  web-security:
    csp-enforce: ${CSP_ENFORCE:false}
    csp-policy: "default-src 'none'; base-uri 'none'; frame-ancestors 'none'; form-action 'none'; object-src 'none'"
    csp-report-uri: ${CSP_REPORT_URI:}
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
  naver:
    client-id: ${NAVER_CLIENT_ID:}
    client-secret: ${NAVER_CLIENT_SECRET:}
    datalab-daily-quota: ${NAVER_DATALAB_DAILY_QUOTA:1000}
  naver-api-hub:
    client-id: ${NAVER_API_HUB_CLIENT_ID:}
    client-secret: ${NAVER_API_HUB_CLIENT_SECRET:}
    shopping-search-endpoint: ${NAVER_API_HUB_SHOPPING_SEARCH_ENDPOINT:}
    shopping-insight-endpoint: ${NAVER_API_HUB_SHOPPING_INSIGHT_ENDPOINT:}
  batch:
    datalab-daily-target-limit: ${DATALAB_DAILY_TARGET_LIMIT:50}
  jwt:
    secret: ${JWT_SECRET:}
    access-token-ttl: ${JWT_ACCESS_TOKEN_TTL:PT30M}
    refresh-token-ttl: ${JWT_REFRESH_TOKEN_TTL:P14D}
  auth:
    rate-limit:
      login-account-limit: ${AUTH_LOGIN_ACCOUNT_LIMIT:5}
      login-ip-limit: ${AUTH_LOGIN_IP_LIMIT:20}
      login-window: ${AUTH_LOGIN_WINDOW:PT15M}
      signup-account-limit: ${AUTH_SIGNUP_ACCOUNT_LIMIT:3}
      signup-ip-limit: ${AUTH_SIGNUP_IP_LIMIT:10}
      signup-window: ${AUTH_SIGNUP_WINDOW:PT1H}
      password-reset-account-limit: ${AUTH_PASSWORD_RESET_ACCOUNT_LIMIT:3}
      password-reset-ip-limit: ${AUTH_PASSWORD_RESET_IP_LIMIT:10}
      password-reset-window: ${AUTH_PASSWORD_RESET_WINDOW:PT1H}
      max-tracked-keys: ${AUTH_RATE_LIMIT_MAX_TRACKED_KEYS:100000}
  wholesale:
    upload-security:
      quarantine-directory: ${UPLOAD_QUARANTINE_DIR:./data/quarantine}
      max-file-size: ${UPLOAD_MAX_FILE_SIZE:10MB}
    xlsx-security:
      max-zip-entries: ${XLSX_MAX_ZIP_ENTRIES:1000}
      max-uncompressed-size: ${XLSX_MAX_UNCOMPRESSED_SIZE:50MB}
      min-inflate-ratio: ${XLSX_MIN_INFLATE_RATIO:0.01}
      max-sheets: ${XLSX_MAX_SHEETS:10}
      max-rows: ${XLSX_MAX_ROWS:20000}
      max-columns: ${XLSX_MAX_COLUMNS:100}
      max-cell-length: ${XLSX_MAX_CELL_LENGTH:10000}
      max-extracted-text-size: ${XLSX_MAX_EXTRACTED_TEXT_SIZE:20MB}
    raw-lifecycle:
      retention: ${UPLOAD_RAW_RETENTION:P7D}
      cleanup-batch-size: ${UPLOAD_RAW_CLEANUP_BATCH_SIZE:100}
